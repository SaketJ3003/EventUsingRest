<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-2xl font-bold">Admin Panel</h1>
            </div>
            <nav class="flex-1 p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/event/admin/dashboard/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/categories/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Categories
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/tags/" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-gray-700 text-white font-medium">
                            Tags
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-600 text-gray-300 hover:text-white transition">
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm">
                <div class="px-8 py-6">
                    <h2 class="text-2xl font-bold text-gray-900">Tags Management</h2>
                </div>
            </header>

            <div class="p-8">
                <div id="successMessage" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800"></div>
                <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-800"></div>

                <div class="mb-6 flex justify-between items-center">
                    <input type="text" id="searchInput" placeholder="Search tags..." 
                        class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 w-64"
                        oninput="filterTags()">
                    <button onclick="openAddModal()" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
                        + Add Tag
                    </button>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tagsTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading tags...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="tagModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6 border-b">
                <h3 class="text-xl font-bold" id="modalTitle">Add Tag</h3>
            </div>
            <div class="p-6">
                <form id="tagForm" class="space-y-4">
                    <input type="hidden" id="tagId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tag Name *</label>
                        <input type="text" id="tagName" maxlength="20" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            placeholder="Enter tag name">
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="tagActive" checked class="rounded border-gray-300">
                        <label for="tagActive" class="ml-2 text-sm text-gray-700">Active</label>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t flex gap-4 justify-end">
                <button onclick="closeModal()" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                <button onclick="saveTag()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allTags = [];
        let isEditMode = false;

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/event/template/login/';
        }

        async function checkAdmin() {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                window.location.href = '/event/template/login/';
                return false;
            }

            try {
                const response = await fetch('/event/user-status/', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.is_admin) {
                        alert('Access denied. Admin only.');
                        window.location.href = '/event/template/events/';
                        return false;
                    }
                    return true;
                } else {
                    window.location.href = '/event/template/login/';
                    return false;
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                window.location.href = '/event/template/login/';
                return false;
            }
        }

        async function loadTags() {
            try {
                const response = await fetch('/event/tags/');
                if (response.ok) {
                    allTags = await response.json();
                    renderTags(allTags);
                } else {
                    showError('Failed to load tags');
                }
            } catch (error) {
                console.error('Error loading tags:', error);
                showError('Error loading tags');
            }
        }

        function renderTags(tags) {
            const tbody = document.getElementById('tagsTableBody');
            
            if (tags.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No tags found</td></tr>';
                return;
            }

            tbody.innerHTML = tags.map(tag => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm text-gray-900">${tag.id}</td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-gray-900">${tag.name}</div>
                        <div class="text-sm text-gray-500">${tag.slug}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${tag.isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${tag.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-900">${new Date(tag.created_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</td>
                    <td class="px-6 py-4 text-sm font-medium space-x-2">
                        <button onclick="openEditModal(${tag.id})" class="text-indigo-600 hover:text-indigo-900">Edit</button>
                        <button onclick="deleteTag(${tag.id})" class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTags() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTags.filter(tag => 
                tag.name.toLowerCase().includes(searchTerm) ||
                tag.slug.toLowerCase().includes(searchTerm)
            );
            renderTags(filtered);
        }

        function openAddModal() {
            isEditMode = false;
            document.getElementById('modalTitle').textContent = 'Add Tag';
            document.getElementById('tagId').value = '';
            document.getElementById('tagName').value = '';
            document.getElementById('tagActive').checked = true;
            document.getElementById('tagModal').classList.remove('hidden');
        }

        function openEditModal(tagId) {
            isEditMode = true;
            const tag = allTags.find(t => t.id === tagId);
            if (!tag) return;

            document.getElementById('modalTitle').textContent = 'Edit Tag';
            document.getElementById('tagId').value = tag.id;
            document.getElementById('tagName').value = tag.name;
            document.getElementById('tagActive').checked = tag.isActive;
            document.getElementById('tagModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('tagModal').classList.add('hidden');
        }

        async function saveTag() {
            const name = document.getElementById('tagName').value.trim();
            const isActive = document.getElementById('tagActive').checked;

            if (!name) {
                showError('Tag name is required');
                return;
            }

            const tagData = {
                name: name,
                isActive: isActive
            };

            try {
                const accessToken = localStorage.getItem('access_token');
                let url = '/event/tags/';
                let method = 'POST';

                if (isEditMode) {
                    const tagId = document.getElementById('tagId').value;
                    url = `/event/tags/${tagId}/`;
                    method = 'PUT';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(tagData)
                });

                if (response.ok) {
                    showSuccess(`Tag ${isEditMode ? 'updated' : 'created'} successfully`);
                    closeModal();
                    loadTags();
                } else {
                    const errorData = await response.json();
                    const errors = Object.entries(errorData).map(([key, value]) => `${key}: ${value}`);
                    showError(errors);
                }
            } catch (error) {
                console.error('Error saving tag:', error);
                showError('Error saving tag');
            }
        }

        async function deleteTag(tagId) {
            if (!confirm('Are you sure you want to delete this tag?')) return;

            try {
                const accessToken = localStorage.getItem('access_token');
                const response = await fetch(`/event/tags/${tagId}/`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    showSuccess('Tag deleted successfully');
                    loadTags();
                } else {
                    showError('Failed to delete tag');
                }
            } catch (error) {
                console.error('Error deleting tag:', error);
                showError('Error deleting tag');
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            if (Array.isArray(message)) {
                el.innerHTML = message.map(msg => `<div class="mb-2 last:mb-0">• ${msg}</div>`).join('');
            } else {
                el.textContent = message;
            }
            el.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                loadTags();
            }
        });
    </script>
</body>
</html>
