<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-2xl font-bold">Admin Panel</h1>
            </div>
            <nav class="flex-1 p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/event/admin/dashboard/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/categories/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Categories
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/tags/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Tags
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/countries/" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-gray-700 text-white font-medium">
                            Countries
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/states/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            States
                        </a>
                    </li>
                    <li>
                        <a href="/event/admin/cities/" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Cities
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-red-600 text-gray-300 hover:text-white transition">
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm">
                <div class="px-8 py-6">
                    <h2 class="text-2xl font-bold text-gray-900">Country Management</h2>
                </div>
            </header>

            <div class="p-8">
                <div id="successMessage" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800"></div>
                <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-800"></div>

                <div class="mb-6 flex justify-between items-center">
                    <input type="text" id="searchInput" placeholder="Search countries..." 
                        class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 w-64"
                        oninput="filterCountries()">
                    <button onclick="openAddModal()" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
                        + Add Country
                    </button>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Slug</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="countriesTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading countries...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="paginationControls" class="mt-6 flex items-center justify-between">
                    <div class="text-sm text-gray-700">
                        Showing <span id="pageInfo"></span>
                    </div>
                    <div class="flex gap-2">
                        <button id="prevBtn" onclick="loadPage(currentPage - 1)" 
                            class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                            Previous
                        </button>
                        <span id="pageNumbers" class="flex items-center px-4"></span>
                        <button id="nextBtn" onclick="loadPage(currentPage + 1)" 
                            class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                            Next
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="countryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6 border-b">
                <h3 class="text-xl font-bold" id="modalTitle">Add Country</h3>
            </div>
            <div class="p-6">
                <form id="countryForm" class="space-y-4">
                    <input type="hidden" id="countryId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Country Name</label>
                        <input type="text" id="countryName" maxlength="100" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            placeholder="Enter country name">
                    </div>
                </form>
            </div>
            <div class="p-6 border-t flex gap-4 justify-end">
                <button onclick="closeModal()" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</button>
                <button onclick="saveCountry()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allCountries = [];
        let isEditMode = false;
        let currentPage = 1;
        let totalPages = 1;
        let totalCount = 0;
        let nextUrl = null;
        let prevUrl = null;

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/event/template/login/';
        }

        async function checkAdmin() {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                window.location.href = '/event/template/login/';
                return false;
            }

            try {
                const response = await fetch('/event/user-status/', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.is_admin) {
                        alert('Access denied. Admin only.');
                        window.location.href = '/event/template/events/';
                        return false;
                    }
                    return true;
                } else {
                    window.location.href = '/event/template/login/';
                    return false;
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                window.location.href = '/event/template/login/';
                return false;
            }
        }

        async function loadCountries(url = '/event/countries/') {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    allCountries = data.results || data;
                    totalCount = data.count || allCountries.length;
                    nextUrl = data.next;
                    prevUrl = data.previous;
                    
                    if (url.includes('page=')) {
                        currentPage = parseInt(new URL(url, window.location.origin).searchParams.get('page')) || 1;
                    } else {
                        currentPage = 1;
                    }
                    
                    totalPages = Math.ceil(totalCount / 10);
                    renderCountries(allCountries);
                    updatePaginationControls();
                } else {
                    showError('Failed to load countries');
                }
            } catch (error) {
                console.error('Error loading countries:', error);
                showError('Error loading countries');
            }
        }

        function renderCountries(countries) {
            const tbody = document.getElementById('countriesTableBody');
            
            if (countries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No countries found</td></tr>';
                return;
            }

            tbody.innerHTML = countries.map(country => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm text-gray-900">${country.id}</td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">${country.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${country.slug}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${new Date(country.created_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</td>
                    <td class="px-6 py-4 text-sm font-medium space-x-2">
                        <button onclick="openEditModal(${country.id})" class="text-indigo-600 hover:text-indigo-900">Edit</button>
                        <button onclick="deleteCountry(${country.id})" class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterCountries() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCountries.filter(country => 
                country.name.toLowerCase().includes(searchTerm)
            );
            renderCountries(filtered);
        }

        function openAddModal() {
            isEditMode = false;
            document.getElementById('modalTitle').textContent = 'Add Country';
            document.getElementById('countryId').value = '';
            document.getElementById('countryName').value = '';
            document.getElementById('countryModal').classList.remove('hidden');
        }

        function openEditModal(countryId) {
            isEditMode = true;
            const country = allCountries.find(c => c.id === countryId);
            if (!country) return;

            document.getElementById('modalTitle').textContent = 'Edit Country';
            document.getElementById('countryId').value = country.id;
            document.getElementById('countryName').value = country.name;
            document.getElementById('countryModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('countryModal').classList.add('hidden');
        }

        async function saveCountry() {
            const name = document.getElementById('countryName').value.trim();

            if (!name) {
                showError('Country name is required');
                return;
            }

            const countryData = { name: name };

            try {
                const accessToken = localStorage.getItem('access_token');
                let url = '/event/countries/';
                let method = 'POST';

                if (isEditMode) {
                    const countryId = document.getElementById('countryId').value;
                    url = `/event/countries/${countryId}/`;
                    method = 'PUT';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(countryData)
                });

                if (response.ok) {
                    showSuccess(`Country ${isEditMode ? 'updated' : 'created'} successfully`);
                    closeModal();
                    loadCountries();
                } else {
                    const errorData = await response.json();
                    const errors = Object.entries(errorData).map(([key, value]) => `${key}: ${value}`);
                    showError(errors);
                }
            } catch (error) {
                console.error('Error saving country:', error);
                showError('Error saving country');
            }
        }

        async function deleteCountry(countryId) {
            if (!confirm('Are you sure you want to delete this country? This will also delete all related states and cities.')) return;

            try {
                const accessToken = localStorage.getItem('access_token');
                const response = await fetch(`/event/countries/${countryId}/`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    showSuccess('Country deleted successfully');
                    loadCountries();
                } else {
                    showError('Failed to delete country');
                }
            } catch (error) {
                console.error('Error deleting country:', error);
                showError('Error deleting country');
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            if (Array.isArray(message)) {
                el.innerHTML = message.map(msg => `<div class="mb-2 last:mb-0">• ${msg}</div>`).join('');
            } else {
                el.textContent = message;
            }
            el.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function loadPage(page) {
            if (page < 1 || page > totalPages) return;
            loadCountries(`/event/countries/?page=${page}`);
        }

        function updatePaginationControls() {
            document.getElementById('prevBtn').disabled = !prevUrl;
            document.getElementById('nextBtn').disabled = !nextUrl;
            
            const start = ((currentPage - 1) * 10) + 1;
            const end = Math.min(currentPage * 10, totalCount);
            document.getElementById('pageInfo').textContent = `${start}-${end} of ${totalCount}`;
            document.getElementById('pageNumbers').textContent = `Page ${currentPage} of ${totalPages}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                loadCountries();
            }
        });
    </script>
</body>
</html>
