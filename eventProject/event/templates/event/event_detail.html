<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-sans">
    <nav class="border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <h1 class="text-3xl font-mono tracking-tight"><a href="/event/template/events/" class="hover:text-gray-600 transition">EVENTS</a></h1>
            <div class="space-x-4">
                <a href="/event/template/login/" class="text-sm text-gray-600 hover:text-gray-900">Login</a>
                <a href="/event/template/signup/" class="text-sm text-gray-600 hover:text-gray-900">Sign Up</a>
                <button onclick="logout()" class="hidden text-sm text-red-600 hover:text-red-900" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <a href="/event/template/events/" class="inline-flex items-center gap-2 text-gray-500 hover:text-gray-900 mb-8 font-medium">
            <span class="text-2xl">←</span> 
            <span>Back</span>
        </a>

        <div id="loadingContainer" class="text-center py-16">
            <p class="text-gray-500 text-lg">Loading event details...</p>
        </div>
        
        <div id="eventContainer"></div>
    </div>

    <script>
        function checkAuth() {
            const accessToken = localStorage.getItem('access_token');
            const loginLink = document.querySelector('a[href="/event/template/login/"]');
            const signupLink = document.querySelector('a[href="/event/template/signup/"]');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (accessToken) {
                if (loginLink) loginLink.style.display = 'none';
                if (signupLink) signupLink.style.display = 'none';
                if (logoutBtn) logoutBtn.classList.remove('hidden');
            } else {
                if (loginLink) loginLink.style.display = 'inline';
                if (signupLink) signupLink.style.display = 'inline';
                if (logoutBtn) logoutBtn.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            location.reload();
        }

        async function loadEventDetail() {
            const slug = window.location.pathname.split('/').filter(Boolean).pop();
            
            try {
                const accessToken = localStorage.getItem('access_token');
                const headers = {
                    'Content-Type': 'application/json'
                };
                
                if (accessToken) {
                    headers['Authorization'] = `Bearer ${accessToken}`;
                }
                
                const response = await fetch(`/event/events/${slug}/`, {
                    headers: headers
                });
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const event = await response.json();
                console.log('Event data:', event);
                
                const container = document.getElementById('eventContainer');
                const loadingDiv = document.getElementById('loadingContainer');
                
                loadingDiv.style.display = 'none';
                
                document.title = (event.title || 'Event') + ' - Event Details';
                
                container.innerHTML = `
                    <div class="max-w-6xl">
                        ${!event.is_active ? '<div class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg"><p class="text-red-800"><strong>Status:</strong> This event is currently inactive and only visible to administrators.</p></div>' : ''}
                        <div class="mb-12">
                            <div class="w-full h-80 md:h-96 bg-gray-900 rounded-xl overflow-hidden shadow-lg mb-8">
                                ${event.feature_image ? 
                                    `<img src="${event.feature_image}" alt="${event.title}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" onerror="this.src='/static/placeholder.png'">` :
                                    '<div class="w-full h-full bg-gradient-to-br from-gray-700 to-gray-900 flex items-center justify-center"><span class="text-gray-400 text-lg">No image available</span></div>'}
                            </div>
                            
                            <div class="space-y-4">
                                <h1 class="text-5xl lg:text-6xl font-light text-gray-900 tracking-tight">${event.title || 'Event'}</h1>
                                
                                <div class="flex flex-wrap gap-6 pt-4 ">
                                    <div class="flex items-center gap-3">
                                        <div>
                                            <div class="text-xs text-gray-500 uppercase">Date</div>
                                            <div class="font-medium text-gray-900">
                                                ${event.event_date 
                                                    ? new Date(event.event_date).toLocaleDateString('en-GB', { 
                                                        day: '2-digit', 
                                                        month: 'short', 
                                                        year: 'numeric' 
                                                    }) 
                                                    : 'N/A'}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="flex items-center gap-3">
                                        <div>
                                            <div class="text-xs text-gray-500 uppercase">Views</div>
                                            <div class="font-medium text-gray-900">${event.views_count || 0}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                            <div class="lg:col-span-2 space-y-12">
                                <div>
                                    <div class="flex items-center gap-3 mb-6">
                                        <div class="w-1 h-6 bg-gray-900"></div>
                                        <h2 class="text-lg font-semibold text-gray-900 uppercase tracking-wider">About Event</h2>
                                    </div>
                                    <div class="prose prose-gray max-w-none">
                                        <p class="text-gray-700 leading-relaxed text-base space-y-4">${event.long_description || 'No description available'}</p>
                                    </div>
                                </div>
                                
                                <div class="bg-white border border-gray-200 rounded-lg p-6 top-20 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                    <div class="flex items-center gap-3 mb-6">
                                        <div class="w-1 h-6 bg-gray-900"></div>
                                        <h2 class="text-lg font-semibold text-gray-900 uppercase tracking-wider">Event Location</h2>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Venue</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.venue || 'N/A'}</div>
                                        </div>
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">City</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.city?.name || ''}</div>
                                        </div>
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">State</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.state?.name || ''}</div>
                                        </div>
                                        <div>
                                            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Country</div>
                                            <div class="text-gray-900 text-lg font-medium">${event.country?.name || 'N/A'}</div>
                                        </div>
                                    </div>
                                </div>
                                
                                ${event.extraImages && event.extraImages.length > 0 ? `
                                    <div>
                                        <div class="flex items-center gap-3 mb-8">
                                            <div class="w-1 h-6 bg-gray-900"></div>
                                            <h2 class="text-lg font-semibold text-gray-900 uppercase tracking-wider">Gallery</h2>
                                        </div>
                                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                            ${event.extraImages.map(img => `
                                                <div class="overflow-hidden rounded-lg shadow-md">
                                                    <div class="aspect-square bg-gray-100 overflow-hidden">
                                                        <img src="${typeof img === 'string' ? img : img.image}" alt="Event Gallery" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300" onerror="this.src='/static/placeholder.png'">
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="space-y-6">
                                <div class="bg-white border border-gray-200 rounded-lg p-6 top-20 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                    <div class="flex items-center gap-2 mb-6">
                                        <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider">Schedule</h3>
                                    </div>
                                    <div class="space-y-5">
                                        <div class="pb-4 border-b border-gray-100">
                                            <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">Start Time</div>
                                            <div class="text-lg font-medium text-gray-900">
                                                ${event.start_time 
                                                    ? new Date(`1970-01-01T${event.start_time}`).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) 
                                                    : 'N/A'}
                                            </div>
                                        </div>
                                        <div>
                                            <div class="text-xs text-gray-500 font-semibold uppercase tracking-wide mb-2">End Time</div>
                                            <div class="text-lg font-medium text-gray-900">
                                                ${event.end_time 
                                                    ? new Date(`1970-01-01T${event.end_time}`).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) 
                                                    : 'N/A'}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                ${event.category && event.category.length > 0 ? `
                                    <div class="bg-white border border-gray-200 rounded-lg p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                        <div class="flex items-center gap-2 mb-4">
                                            <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider">Category</h3>
                                        </div>
                                        <div class="flex flex-wrap gap-2">
                                            ${event.category.map(cat => `
                                                <span class="inline-flex items-center bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-medium">
                                                    ${cat.name || cat}
                                                </span>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                                
                                ${event.tags && event.tags.length > 0 ? `
                                    <div class="bg-white border border-gray-200 rounded-lg p-6 hover:border-gray-400 transition-all duration-300 hover:shadow-lg">
                                        <div class="flex items-center gap-2 mb-4">
                                            <h3 class="text-base font-semibold text-gray-900 uppercase tracking-wider">Tags</h3>
                                        </div>
                                        <div class="flex flex-wrap gap-2">
                                            ${event.tags.map(tag => `
                                                <span class="capitalize inline-flex items-center bg-gray-900 text-white px-3 py-1.5 rounded text-xs font-medium">
                                                    ${tag.name || tag}
                                                </span>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        
                        {% comment %} <div id="adminActions" class="hidden mt-12 pt-8 border-t border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-900 mb-4 uppercase tracking-wider">Admin Actions</h3>
                            <div class="flex flex-wrap gap-4">
                                <button onclick="editEvent('${event.slug}')" class="px-6 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition font-medium">Edit Event</button>
                                <button onclick="eventStatus('${event.slug}', ${event.is_active})" class="px-6 py-3 bg-yellow-600 text-white rounded-full hover:bg-yellow-700 transition font-medium">${event.is_active ? 'Deactivate' : 'Activate'}</button>
                                <button onclick="deleteEvent('${event.slug}')" class="px-6 py-3 bg-red-600 text-white rounded-full hover:bg-red-700 transition font-medium">Delete Event</button>
                            </div>
                        </div> {% endcomment %}
                    </div>
                `;
                
                await checkAdminAndShowActions();
                
            } catch (error) {
                console.error('Error loading event:', error);
                document.getElementById('loadingContainer').innerHTML = `<p class="text-red-500 text-lg">Error loading event: ${error.message}</p>`;
            }
        }
        

        async function checkAdminAndShowActions() {
            const accessToken = localStorage.getItem('access_token');
            
            if (!accessToken) {
                return;
            }
            
            try {
                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${accessToken}`
                };
                
                const response = await fetch('/event/user-status/', {
                    headers: headers
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('User status:', data);
                    if (data.is_admin) {
                        const adminActions = document.getElementById('adminActions');
                        if (adminActions) {
                            adminActions.classList.remove('hidden');
                        }
                    }
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
            }
        }
        
        function editEvent(slug) {
            alert('It will soon be working');
            // window.location.href = `/event/template/events/${slug}/edit/`;
        }
        
        async function deleteEvent(slug) {
            if (!confirm('Are you sure you want to delete this event?')) {
                return;
            }
            
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                alert('You must be logged in to delete an event');
                return;
            }
            
            try {
                const response = await fetch(`/event/events/${slug}/`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok || response.status === 204) {
                    alert('Event deleted successfully');
                    window.location.href = '/event/template/events/';
                } else {
                    const error = await response.json();
                    alert('Error deleting event: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error deleting event:', error);
                alert('Error deleting event: ' + error.message);
            }
        }
        
        async function eventStatus(slug, currentStatus) {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                alert('You must be logged in to manage event status');
                return;
            }
            
            try {
                const response = await fetch(`/event/events/${slug}/`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        is_active: !currentStatus
                    })
                });
                
                if (response.ok) {
                    const updatedEvent = await response.json();
                    alert(`Event is now ${updatedEvent.is_active ? 'active' : 'inactive'}`);
                    location.reload();
                } else {
                    const error = await response.json();
                    alert('Error updating event status: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error toggling event status:', error);
                alert('Error toggling event status: ' + error.message);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadEventDetail();
        });
    </script>
</body>
</html>
