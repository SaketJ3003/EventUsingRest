<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-2xl font-bold">Admin Panel</h1>
            </div>
            <nav class="flex-1 p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/admin-panel/dashboard/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/categories/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Categories
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/tags/" class="flex items-center gap-3 px-4 py-3 rounded-full bg-gray-700 text-white font-medium">
                            Tags
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/countries/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Countries
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/states/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            States
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/cities/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Cities
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-full hover:bg-red-600 text-gray-300 hover:text-white transition">
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm">
                <div class="px-8 py-6">
                    <h2 class="text-2xl font-bold text-gray-900">Tags Management</h2>
                </div>
            </header>

            <div class="p-8">
                <div id="successMessage" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800"></div>
                <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-800"></div>

                <div class="mb-6 flex justify-between items-center">
                    <input type="text" id="searchInput" placeholder="Search tags..." 
                        class="px-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500 w-64"
                        oninput="filterTags()">
                    <button onclick="openAddModal()" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-full hover:bg-blue-700 transition">
                        + Add Tag
                    </button>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">S.No</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tags</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tagsTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading tags...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="paginationControls" class="mt-6 flex items-center justify-between">
                    <div class="text-sm text-gray-700">
                        Showing <span id="pageInfo"></span>
                    </div>
                    <div class="flex gap-2">
                        <button id="prevBtn" onclick="loadPage(currentPage - 1)" 
                            class="px-4 py-2 border border-gray-300 rounded-full hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                            Previous
                        </button>
                        <span id="pageNumbers" class="flex items-center px-4"></span>
                        <button id="nextBtn" onclick="loadPage(currentPage + 1)" 
                            class="px-4 py-2 border border-gray-300 rounded-full hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                            Next
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="tagModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6 border-b">
                <h3 class="text-xl font-bold" id="modalTitle">Add Tag</h3>
            </div>
            <div class="p-6">
                <form id="tagForm" class="space-y-4">
                    <input type="hidden" id="tagId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tag Name *</label>
                        <input type="text" id="tagName" maxlength="20" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500" 
                            placeholder="Enter tag name">
                        <span id="tagName-error" class="hidden text-red-500 text-xs mt-1 block"></span>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="tagActive" checked class="rounded border-gray-300">
                        <label for="tagActive" class="ml-2 text-sm text-gray-700">Active</label>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t flex gap-4 justify-end">
                <button onclick="closeModal()" class="px-6 py-2 border border-gray-300 rounded-full hover:bg-gray-50">Cancel</button>
                <button onclick="saveTag()" class="px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allTags = [];
        let allTagSlugs = [];   
        let isEditMode = false;
        let currentPage = 1;
        let totalPages = 1;
        let totalCount = 0;
        let nextUrl = null;
        let prevUrl = null;
        let currentBaseUrl = '/event/tags/';

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/event/template/login/';
        }

        async function checkAdmin() {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                window.location.href = '/event/template/login/';
                return false;
            }

            try {
                const response = await fetch('/event/user-status/', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.is_admin) {
                        alert('Access denied. Admin only.');
                        window.location.href = '/event/template/events/';
                        return false;
                    }
                    return true;
                } else {
                    window.location.href = '/event/template/login/';
                    return false;
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                window.location.href = '/event/template/login/';
                return false;
            }
        }

        async function loadTags(url = '/event/tags/') {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    allTags = data.results || data;
                    totalCount = data.count || allTags.length;
                    nextUrl = data.next;
                    prevUrl = data.previous;
                    
                    if (url.includes('page=')) {
                        currentPage = parseInt(new URL(url, window.location.origin).searchParams.get('page')) || 1;
                    } else {
                        currentPage = 1;
                    }
                    
                    totalPages = Math.ceil(totalCount / 10);
                    renderTags(allTags);
                    updatePaginationControls();
                    loadAllTagSlugs();
                } else {
                    showError('Failed to load tags');
                }
            } catch (error) {
                console.error('Error loading tags:', error);
                showError('Error loading tags');
            }
        }

        function renderTags(tags) {
            const tbody = document.getElementById('tagsTableBody');
            
            if (tags.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No tags found</td></tr>';
                return;
            }

            const startIndex = (currentPage - 1) * 10;
            tbody.innerHTML = tags.map((tag, index) => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm text-gray-900">${ startIndex + index + 1}</td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-gray-900">${tag.name}</div>
                        <div class="text-sm text-gray-500">${tag.slug}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${tag.isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${tag.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-900">${new Date(tag.created_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</td>
                    <td class="px-6 py-4 text-sm font-medium space-x-2">
                        <button onclick="openEditModal(${tag.id})" class="text-indigo-600 hover:text-indigo-900">Edit</button>
                        <button onclick="deleteTag(${tag.id})" class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTags() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const params = new URLSearchParams();
            if (searchTerm) params.set('search', searchTerm);
            currentBaseUrl = '/event/tags/?' + params.toString();
            loadTags(currentBaseUrl);
        }

        function openAddModal() {
            isEditMode = false;
            document.getElementById('modalTitle').textContent = 'Add Tag';
            document.getElementById('tagId').value = '';
            document.getElementById('tagName').value = '';
            document.getElementById('tagActive').checked = true;
            clearTagNameError();
            document.getElementById('tagModal').classList.remove('hidden');
        }

        function openEditModal(tagId) {
            isEditMode = true;
            const tag = allTags.find(t => t.id === tagId);
            if (!tag) return;

            document.getElementById('modalTitle').textContent = 'Edit Tag';
            document.getElementById('tagId').value = tag.id;
            document.getElementById('tagName').value = tag.name;
            document.getElementById('tagActive').checked = tag.isActive;
            clearTagNameError();
            document.getElementById('tagModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('tagModal').classList.add('hidden');
            clearTagNameError();
        }

        async function saveTag() {
            const name = document.getElementById('tagName').value;
            const isActive = document.getElementById('tagActive').checked;

            const error = validateTagName(name);
            showTagNameError(error);
            if (error) return;

            const tagData = {
                name: name,
                isActive: isActive
            };

            try {
                const accessToken = localStorage.getItem('access_token');
                let url = '/event/tags/';
                let method = 'POST';

                if (isEditMode) {
                    const tagId = document.getElementById('tagId').value;
                    url = `/event/tags/${tagId}/`;
                    method = 'PUT';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(tagData)
                });

                if (response.ok) {
                    showSuccess(`Tag ${isEditMode ? 'updated' : 'created'} successfully`);
                    closeModal();
                    loadTags();
                } else {
                    const errorData = await response.json();
                    if (errorData.name) {
                        showTagNameError(Array.isArray(errorData.name) ? errorData.name[0] : errorData.name);
                    } else {
                        const errors = Object.entries(errorData).map(([key, value]) => `${key}: ${Array.isArray(value) ? value.join(', ') : value}`);
                        showError(errors);
                    }
                }
            } catch (error) {
                console.error('Error saving tag:', error);
                showError('Error saving tag');
            }
        }

        async function deleteTag(tagId) {
            if (!confirm('Are you sure you want to delete this tag?')) return;

            try {
                const accessToken = localStorage.getItem('access_token');
                const response = await fetch(`/event/tags/${tagId}/`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    showSuccess('Tag deleted successfully');
                    loadTags();
                } else {
                    showError('Failed to delete tag');
                }
            } catch (error) {
                console.error('Error deleting tag:', error);
                showError('Error deleting tag');
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            if (Array.isArray(message)) {
                el.innerHTML = message.map(msg => `<div class="mb-2 last:mb-0">• ${msg}</div>`).join('');
            } else {
                el.textContent = message;
            }
            el.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function loadPage(page) {
            if (page < 1 || page > totalPages) return;
            const url = new URL(currentBaseUrl, window.location.origin);
            url.searchParams.set('page', page);
            loadTags(url.toString());
        }

        function updatePaginationControls() {
            document.getElementById('prevBtn').disabled = !prevUrl;
            document.getElementById('nextBtn').disabled = !nextUrl;
            
            const start = ((currentPage - 1) * 10) + 1;
            const end = Math.min(currentPage * 10, totalCount);
            document.getElementById('pageInfo').textContent = `${start}-${end} of ${totalCount}`;
            document.getElementById('pageNumbers').textContent = `Page ${currentPage} of ${totalPages}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                loadTags();
            }

            function debounce(fn, delay) {
                let timer;
                return function (...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), delay);
                };
            }

            const nameInput = document.getElementById('tagName');
            nameInput.addEventListener('input', debounce(function () {
                showTagNameError(validateTagName(this.value));
            }, 300));
            nameInput.addEventListener('blur', function () {
                showTagNameError(validateTagName(this.value));
            });
        });

        function generateSlug(value) {
            return value.trim().toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
        }

        async function loadAllTagSlugs() {
            try {
                let url = '/event/tags/';
                allTagSlugs = [];
                while (url) {
                    const response = await fetch(url);
                    if (!response.ok) break;
                    const data = await response.json();
                    (data.results || data).forEach(t => allTagSlugs.push({ id: t.id, slug: t.slug }));
                    url = data.next;
                }
            } catch (e) {
                console.error('Error loading tag slugs:', e);
            }
        }

        function validateTagName(value) {
            if (!value || !value.trim())
                return 'Tag name is required.';
            if (value !== value.trim())
                return 'Tag name cannot have leading or trailing spaces.';
            if (/ {2,}/.test(value))
                return 'Tag name cannot contain multiple consecutive spaces.';
            if (value.trim().length < 3)
                return 'Tag name must be at least 3 characters.';
            if (value.trim().length > 20)
                return 'Tag name cannot exceed 20 characters.';
            if (!/^[a-zA-Z]+(\s[a-zA-Z]+)*$/.test(value.trim()))
                return 'Tag name can only contain letters and single spaces between words.';
            const candidateSlug = generateSlug(value);
            const editingId = isEditMode ? parseInt(document.getElementById('tagId').value) : null;
            const duplicate = allTagSlugs.find(s => s.slug === candidateSlug && s.id !== editingId);
            if (duplicate)
                return 'A tag with this name already exists.';
            return '';
        }

        function showTagNameError(errorMessage) {
            const input   = document.getElementById('tagName');
            const errSpan = document.getElementById('tagName-error');
            const hasValue = !!input.value;
            input.classList.toggle('border-red-500',   !!errorMessage);
            input.classList.toggle('border-green-500', !errorMessage && hasValue);
            input.classList.toggle('border-gray-300',  !errorMessage && !hasValue);
            errSpan.textContent = errorMessage;
            errSpan.classList.toggle('hidden', !errorMessage);
        }

        function clearTagNameError() {
            const input   = document.getElementById('tagName');
            const errSpan = document.getElementById('tagName-error');
            input.classList.remove('border-red-500', 'border-green-500');
            input.classList.add('border-gray-300');
            errSpan.textContent = '';
            errSpan.classList.add('hidden');
        }
    </script>
</body>
</html>
