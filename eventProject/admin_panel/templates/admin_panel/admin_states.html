<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-2xl font-bold">Admin Panel</h1>
            </div>
            <nav class="flex-1 p-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/admin-panel/dashboard/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/categories/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Categories
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/tags/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Tags
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/countries/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Countries
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/states/" class="flex items-center gap-3 px-4 py-3 rounded-full bg-gray-700 text-white font-medium">
                            States
                        </a>
                    </li>
                    <li>
                        <a href="/admin-panel/cities/" class="flex items-center gap-3 px-4 py-3 rounded-full hover:bg-gray-700 text-gray-300 hover:text-white transition">
                            Cities
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-full hover:bg-red-600 text-gray-300 hover:text-white transition">
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm">
                <div class="px-8 py-6">
                    <h2 class="text-2xl font-bold text-gray-900">State Management</h2>
                </div>
            </header>

            <div class="p-8">
                <div id="successMessage" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800"></div>
                <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-800"></div>

                <div class="mb-6 flex justify-between items-center gap-4">
                    <div class="flex gap-4 flex-1">
                        <input type="text" id="searchInput" placeholder="Search states..." 
                            class="px-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500 w-64"
                            oninput="filterStates()">
                        <select id="countryFilter" class="px-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500"
                            onchange="filterStates()">
                            <option value="">All Countries</option>
                        </select>
                    </div>
                    <button onclick="openAddModal()" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-full hover:bg-blue-700 transition">
                        + Add State
                    </button>
                </div>

                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">S.No</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">States</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Country</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Slug</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="statesTableBody" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="6" class="px-6 py-4 text-center text-gray-500">Loading states...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="paginationControls" class="mt-6 flex items-center justify-between">
                    <div class="text-sm text-gray-700">
                        Showing <span id="pageInfo"></span>
                    </div>
                    <div class="flex gap-2">
                        <button id="prevBtn" onclick="loadPage(currentPage - 1)" 
                            class="px-4 py-2 border border-gray-300 rounded-full hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                            Previous
                        </button>
                        <span id="pageNumbers" class="flex items-center px-4"></span>
                        <button id="nextBtn" onclick="loadPage(currentPage + 1)" 
                            class="px-4 py-2 border border-gray-300 rounded-full hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
                            disabled>
                            Next
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="stateModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6 border-b">
                <h3 class="text-xl font-bold" id="modalTitle">Add State</h3>
            </div>
            <div class="p-6">
                <form id="stateForm" class="space-y-4">
                    <input type="hidden" id="stateId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">State Name</label>
                        <input type="text" id="stateName" maxlength="100" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500" 
                            placeholder="Enter state name">
                        <span id="stateName-error" class="hidden text-red-500 text-xs mt-1 block"></span>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
                        <select id="stateCountry" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-full focus:ring-2 focus:ring-blue-500">
                            <option value="">Select a country</option>
                        </select>
                        <span id="stateCountry-error" class="hidden text-red-500 text-xs mt-1 block"></span>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t flex gap-4 justify-end">
                <button onclick="closeModal()" class="px-6 py-2 border border-gray-300 rounded-full hover:bg-gray-50">Cancel</button>
                <button onclick="saveState()" class="px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allStates = [];
        let allCountries = [];
        let allStateSlugs = [];  
        let isEditMode = false;
        let currentPage = 1;
        let totalPages = 1;
        let totalCount = 0;
        let nextUrl = null;
        let prevUrl = null;
        let currentBaseUrl = '/event/states/';

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/event/template/login/';
        }

        async function checkAdmin() {
            const accessToken = localStorage.getItem('access_token');
            if (!accessToken) {
                window.location.href = '/event/template/login/';
                return false;
            }

            try {
                const response = await fetch('/event/user-status/', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!data.is_admin) {
                        alert('Access denied. Admin only.');
                        window.location.href = '/event/template/events/';
                        return false;
                    }
                    return true;
                } else {
                    window.location.href = '/event/template/login/';
                    return false;
                }
            } catch (error) {
                console.error('Error checking admin status:', error);
                window.location.href = '/event/template/login/';
                return false;
            }
        }

        async function loadCountries() {
            try {
                let allData = [];
                let url = '/event/countries/';
                
                while (url) {
                    const response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        const items = data.results || data;
                        allData = allData.concat(items);
                        url = data.next;
                    } else {
                        showError('Failed to load countries');
                        break;
                    }
                }
                
                allCountries = allData;
                populateCountryDropdowns();
            } catch (error) {
                console.error('Error loading countries:', error);
                showError('Error loading countries');
            }
        }

        function populateCountryDropdowns() {
            const modalSelect = document.getElementById('stateCountry');
            const filterSelect = document.getElementById('countryFilter');

            modalSelect.innerHTML = '<option value="">Select a country</option>' + 
                allCountries.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            filterSelect.innerHTML = '<option value="">All Countries</option>' + 
                allCountries.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function loadStates(url = '/event/states/') {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    allStates = data.results || data;
                    totalCount = data.count || allStates.length;
                    nextUrl = data.next;
                    prevUrl = data.previous;
                    
                    if (url.includes('page=')) {
                        currentPage = parseInt(new URL(url, window.location.origin).searchParams.get('page')) || 1;
                    } else {
                        currentPage = 1;
                    }
                    
                    totalPages = Math.ceil(totalCount / 10);
                    renderStates(allStates);
                    updatePaginationControls();
                    loadAllStateSlugs();
                } else {
                    showError('Failed to load states');
                }
            } catch (error) {
                console.error('Error loading states:', error);
                showError('Error loading states');
            }
        }

        function renderStates(states) {
            const tbody = document.getElementById('statesTableBody');
            
            if (states.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">No states found</td></tr>';
                return;
            }

            const startIndex = (currentPage - 1) * 10;

            tbody.innerHTML = states.map((state, index) => {
                const countryName = state.country_detail ? state.country_detail.name : 'Unknown';
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 text-sm text-gray-900">${startIndex + index + 1}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">${state.name}</td>
                        <td class="px-6 py-4 text-sm text-gray-900">${countryName}</td>
                        <td class="px-6 py-4 text-sm text-gray-500">${state.slug}</td>
                        <td class="px-6 py-4 text-sm text-gray-900">${new Date(state.created_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</td>
                        <td class="px-6 py-4 text-sm font-medium space-x-2">
                            <button onclick="openEditModal(${state.id})" class="text-indigo-600 hover:text-indigo-900">Edit</button>
                            <button onclick="deleteState(${state.id})" class="text-red-600 hover:text-red-900">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterStates() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const countryId = document.getElementById('countryFilter').value;
            const params = new URLSearchParams();
            if (searchTerm) params.set('search', searchTerm);
            if (countryId) params.set('country', countryId);
            currentBaseUrl = '/event/states/?' + params.toString();
            loadStates(currentBaseUrl);
        }

        function openAddModal() {
            isEditMode = false;
            document.getElementById('modalTitle').textContent = 'Add State';
            document.getElementById('stateId').value = '';
            document.getElementById('stateName').value = '';
            document.getElementById('stateCountry').value = '';
            clearStateErrors();
            document.getElementById('stateModal').classList.remove('hidden');
        }

        function openEditModal(stateId) {
            isEditMode = true;
            const state = allStates.find(s => s.id === stateId);
            if (!state) return;

            document.getElementById('modalTitle').textContent = 'Edit State';
            document.getElementById('stateId').value = state.id;
            document.getElementById('stateName').value = state.name;
            document.getElementById('stateCountry').value = state.country_detail ? state.country_detail.id : '';
            clearStateErrors();
            document.getElementById('stateModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('stateModal').classList.add('hidden');
            clearStateErrors();
        }

        async function saveState() {
            const name    = document.getElementById('stateName').value;
            const country = document.getElementById('stateCountry').value;

            const nameError    = validateStateName(name);
            const countryError = country ? '' : 'Country is required.';
            showStateFieldError('stateName',    nameError);
            showStateFieldError('stateCountry', countryError);
            if (nameError || countryError) return;

            const stateData = { name: name, country: country };

            try {
                const accessToken = localStorage.getItem('access_token');
                let url = '/event/states/';
                let method = 'POST';

                if (isEditMode) {
                    const stateId = document.getElementById('stateId').value;
                    url = `/event/states/${stateId}/`;
                    method = 'PUT';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(stateData)
                });

                if (response.ok) {
                    showSuccess(`State ${isEditMode ? 'updated' : 'created'} successfully`);
                    closeModal();
                    loadStates();
                } else {
                    const errorData = await response.json();
                    if (errorData.name) {
                        showStateFieldError('stateName', Array.isArray(errorData.name) ? errorData.name[0] : errorData.name);
                    } else if (errorData.country) {
                        showStateFieldError('stateCountry', Array.isArray(errorData.country) ? errorData.country[0] : errorData.country);
                    } else {
                        const errors = Object.entries(errorData).map(([key, value]) => `${key}: ${Array.isArray(value) ? value.join(', ') : value}`);
                        showError(errors);
                    }
                }
            } catch (error) {
                console.error('Error saving state:', error);
                showError('Error saving state');
            }
        }

        async function deleteState(stateId) {
            if (!confirm('Are you sure you want to delete this state? This will also delete all related cities.')) return;

            try {
                const accessToken = localStorage.getItem('access_token');
                const response = await fetch(`/event/states/${stateId}/`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    showSuccess('State deleted successfully');
                    loadStates();
                } else {
                    showError('Failed to delete state');
                }
            } catch (error) {
                console.error('Error deleting state:', error);
                showError('Error deleting state');
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            if (Array.isArray(message)) {
                el.innerHTML = message.map(msg => `<div class="mb-2 last:mb-0">• ${msg}</div>`).join('');
            } else {
                el.textContent = message;
            }
            el.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function loadPage(page) {
            if (page < 1 || page > totalPages) return;
            const url = new URL(currentBaseUrl, window.location.origin);
            url.searchParams.set('page', page);
            loadStates(url.toString());
        }

        function updatePaginationControls() {
            document.getElementById('prevBtn').disabled = !prevUrl;
            document.getElementById('nextBtn').disabled = !nextUrl;
            
            const start = ((currentPage - 1) * 10) + 1;
            const end = Math.min(currentPage * 10, totalCount);
            document.getElementById('pageInfo').textContent = `${start}-${end} of ${totalCount}`;
            document.getElementById('pageNumbers').textContent = `Page ${currentPage} of ${totalPages}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                await loadCountries();
                await loadStates();
            }

            function debounce(fn, delay) {
                let timer;
                return function (...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), delay);
                };
            }

            const nameInput = document.getElementById('stateName');
            nameInput.addEventListener('input', debounce(function () {
                showStateFieldError('stateName', validateStateName(this.value));
            }, 300));
            nameInput.addEventListener('blur', function () {
                showStateFieldError('stateName', validateStateName(this.value));
            });

            document.getElementById('stateCountry').addEventListener('change', function () {
                showStateFieldError('stateCountry', this.value ? '' : 'Country is required.');
            });
        });

        function generateSlug(value) {
            return value.trim().toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
        }

        async function loadAllStateSlugs() {
            try {
                let url = '/event/states/';
                allStateSlugs = [];
                while (url) {
                    const response = await fetch(url);
                    if (!response.ok) break;
                    const data = await response.json();
                    (data.results || data).forEach(s => allStateSlugs.push({ id: s.id, slug: s.slug }));
                    url = data.next;
                }
            } catch (e) {
                console.error('Error loading state slugs:', e);
            }
        }

        function validateStateName(value) {
            if (!value || !value.trim())
                return 'State name is required.';
            if (value !== value.trim())
                return 'State name cannot have leading or trailing spaces.';
            if (/ {2,}/.test(value))
                return 'State name cannot contain multiple consecutive spaces.';
            if (value.trim().length < 3)
                return 'State name must be at least 3 characters.';
            if (value.trim().length > 100)
                return 'State name cannot exceed 100 characters.';
            if (!/^[a-zA-Z]+(\s[a-zA-Z]+)*$/.test(value.trim()))
                return 'State name can only contain letters and single spaces between words.';
            const candidateSlug = generateSlug(value);
            const editingId = isEditMode ? parseInt(document.getElementById('stateId').value) : null;
            const duplicate = allStateSlugs.find(s => s.slug === candidateSlug && s.id !== editingId);
            if (duplicate)
                return 'A state with this name already exists.';
            return '';
        }

        function showStateFieldError(fieldId, errorMessage) {
            const input   = document.getElementById(fieldId);
            const errSpan = document.getElementById(fieldId + '-error');
            if (!input || !errSpan) return;
            const hasValue = !!input.value;
            input.classList.toggle('border-red-500',   !!errorMessage);
            input.classList.toggle('border-green-500', !errorMessage && hasValue);
            input.classList.toggle('border-gray-300',  !errorMessage && !hasValue);
            errSpan.textContent = errorMessage;
            errSpan.classList.toggle('hidden', !errorMessage);
        }

        function clearStateErrors() {
            ['stateName', 'stateCountry'].forEach(id => {
                const input   = document.getElementById(id);
                const errSpan = document.getElementById(id + '-error');
                if (!input || !errSpan) return;
                input.classList.remove('border-red-500', 'border-green-500');
                input.classList.add('border-gray-300');
                errSpan.textContent = '';
                errSpan.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
